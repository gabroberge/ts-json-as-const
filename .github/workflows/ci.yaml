name: CI
on:
    push:
        branches: ['*']
    pull_request:
        branches: ['*']

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version-file: package.json

            - name: Cache rotation keys
              id: cache-rotation
              shell: bash
              run: |
                  echo "YEAR_MONTH=$(/bin/date -u "+%Y%m")" >> $GITHUB_OUTPUT

            - name: Setup Bun cache
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-cache-${{ steps.cache-rotation.outputs.YEAR_MONTH }}-${{ hashFiles('**/bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-cache-${{ steps.cache-rotation.outputs.YEAR_MONTH }}-

            - name: Install dependencies
              run: bun install --frozen-lockfile
              env:
                  HUSKY: '0'

            - name: Execute lint
              run: bun run lint

            - name: Execute tests
              run: bun run test

            - name: Execute build
              run: bun run build
