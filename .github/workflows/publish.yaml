name: Publish
on:
    push:
        branches: ['master']

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Trusted publishing (OIDC): https://docs.npmjs.com/trusted-publishers
# Changesets needs write access to push version commits / tags and manage release PRs.
permissions:
    contents: write
    pull-requests: write
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Set up pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 9.1.4

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version-file: '.nvmrc'
                  cache: 'pnpm'

            - name: Expose pnpm config(s) through "$GITHUB_OUTPUT"
              id: pnpm-config
              shell: bash
              run: |
                  echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

            - name: Cache rotation keys
              id: cache-rotation
              shell: bash
              run: |
                  echo "YEAR_MONTH=$(/bin/date -u "+%Y%m")" >> $GITHUB_OUTPUT

            - name: Setup pnpm cache
              uses: actions/cache@v5
              with:
                  path: |
                      ${{ steps.pnpm-config.outputs.STORE_PATH }}
                      ~/.cache/Cypress
                  key: ${{ runner.os }}-pnpm-store-cache-${{ steps.cache-rotation.outputs.YEAR_MONTH }}-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: |
                      ${{ runner.os }}-pnpm-store-cache-${{ steps.cache-rotation.outputs.YEAR_MONTH }}-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --prefer-offline
              env:
                  HUSKY: '0'

            - name: Use npm with OIDC trusted publishing support
              run: npm install -g 'npm@^11.5.1'

            - name: Execute lint
              run: pnpm run lint

            - name: Execute tests
              run: pnpm run test

            - name: Create Release Pull Request or Publish
              id: changesets
              uses: changesets/action@v1
              with:
                  publish: pnpm run release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
