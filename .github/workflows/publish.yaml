name: Publish
on:
    push:
        branches: ['master']

concurrency: ${{ github.workflow }}-${{ github.ref }}

# Trusted publishing (OIDC): https://docs.npmjs.com/trusted-publishers
# Changesets needs write access to push version commits / tags and manage release PRs.
permissions:
    contents: write
    pull-requests: write
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v7

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version-file: package.json

            - name: Cache rotation keys
              id: cache-rotation
              shell: bash
              run: |
                  echo "YEAR_MONTH=$(/bin/date -u "+%Y%m")" >> $GITHUB_OUTPUT

            - name: Setup Bun cache
              uses: actions/cache@v5
              with:
                  path: ~/.bun/install/cache
                  key: ${{ runner.os }}-bun-cache-${{ steps.cache-rotation.outputs.YEAR_MONTH }}-${{ hashFiles('**/bun.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-bun-cache-${{ steps.cache-rotation.outputs.YEAR_MONTH }}-

            - name: Install dependencies
              run: bun install --frozen-lockfile
              env:
                  HUSKY: '0'

            - name: Use npm with OIDC trusted publishing support
              run: npm install -g 'npm@^11.5.1'

            - name: Execute lint
              run: bun run lint

            - name: Execute tests
              run: bun run test

            - name: Create Release Pull Request or Publish
              id: changesets
              uses: changesets/action@v1
              with:
                  publish: bun run release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
